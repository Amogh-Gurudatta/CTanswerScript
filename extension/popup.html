<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CT Exporter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-color: #f5f5f7;
      --text-primary: #1d1d1f;
      --text-secondary: #86868b;
      --text-muted: #aeaeb2;
      --border-color: #d2d2d7;
      --btn-bg: #e5e5ea;
      --btn-hover: #d1d1d6;
      --error-bg: #fff2f2;
      --error-border: #ff3b30;
      --track-bg: #e5e5ea;
    }

    [data-theme="dark"] {
      --bg-color: #1e1e1e;
      --text-primary: #ffffff;
      --text-secondary: #a1a1a6;
      --text-muted: #636366;
      --border-color: #38383a;
      --btn-bg: #323232;
      --btn-hover: #424242;
      --error-bg: #2b1111;
      --error-border: #ff453a;
      --track-bg: #323232;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      width: 300px;
      background: var(--bg-color);
      color: var(--text-primary);
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
    }

    .container { padding: 16px; }

    .title-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 14px;
      border-bottom: 0.5px solid var(--border-color);
      margin-bottom: 14px;
    }
    .title-bar .icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      flex-shrink: 0;
      object-fit: cover;
    }
    .title-bar .text h1 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }
    .title-bar .text p {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 1px;
    }
    .theme-toggle {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      color: var(--text-secondary);
      margin-left: auto;
      padding: 4px;
      border-radius: 50%;
      transition: opacity 0.2s;
    }
    .theme-toggle:hover {
      opacity: 0.7;
    }

    /* States */
    .state { display: none; }
    .state.active { display: block; }

    /* Invalid state */
    #state-invalid {
      text-align: center;
      padding: 20px 10px;
    }
    #state-invalid .empty-icon {
      font-size: 28px;
      margin-bottom: 8px;
      opacity: 0.4;
    }
    #state-invalid p {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* Ready state */
    .info-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }
    .info-item label {
      font-size: 11px;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 2px;
    }
    .info-item .value {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .divider {
      height: 0.5px;
      background: var(--border-color);
      margin: 12px 0;
    }

    .btn-primary {
      width: 100%;
      padding: 9px 16px;
      background: #007aff;
      border: none;
      border-radius: 7px;
      color: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-primary:hover:not(:disabled) { background: #0066d6; }
    .btn-primary:active:not(:disabled) { background: #004ea3; }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }

    /* Progress state */
    #state-progress { padding: 4px 0; }
    .progress-info {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }
    .track {
      height: 4px;
      background: var(--track-bg);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .fill {
      height: 100%;
      background: #007aff;
      border-radius: 2px;
      transition: width 0.5s ease;
      width: 0%;
    }
    .step-label {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Error state */
    .error-box {
      background: var(--error-bg);
      border: 0.5px solid var(--error-border);
      border-radius: 7px;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--error-border);
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .btn-secondary {
      width: 100%;
      padding: 8px 16px;
      background: var(--btn-bg);
      border: none;
      border-radius: 7px;
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: var(--btn-hover); }

    /* Done state */
    #state-done { text-align: center; padding: 16px 0; }
    #state-done .check {
      width: 36px;
      height: 36px;
      background: #34c759;
      border-radius: 50%;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      font-weight: 700;
    }
    #state-done p {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }
    #state-done .sub {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 400;
      margin-top: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-bar">
      <img class="icon" src="icons/logo.png" alt="">
      <div class="text">
        <h1>Answer Script Exporter</h1>
        <p>Export results as PDF</p>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    </div>

    <!-- Not a results page -->
    <div id="state-invalid" class="state active">
      <div class="empty-icon">📄</div>
      <p>Open a CodeTantra exam results page, then come back here.</p>
    </div>

    <!-- Ready -->
    <div id="state-ready" class="state">
      <div class="info-row">
        <div class="info-item">
          <label>Exam</label>
          <div class="value" id="popup-exam-title">—</div>
        </div>
        <div class="info-item">
          <label>Student</label>
          <div class="value" id="popup-student">—</div>
        </div>
      </div>
      <button class="btn-primary" id="btn-generate">Export PDF</button>
    </div>

    <!-- Progress -->
    <div id="state-progress" class="state">
      <div class="progress-info">Generating PDF…</div>
      <div class="track"><div class="fill" id="progress-fill"></div></div>
      <div class="step-label" id="progress-step">Starting</div>
    </div>

    <!-- Error -->
    <div id="state-error" class="state">
      <div class="error-box" id="error-msg">Something went wrong.</div>
      <button class="btn-secondary" id="btn-retry">Try Again</button>
    </div>

    <!-- Done -->
    <div id="state-done" class="state">
      <div class="check">✓</div>
      <p>PDF saved</p>
      <p class="sub">Attach it to your LLM chat.</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
